version: 2
updates:
  - package-ecosystem: npm
    directory: /
    schedule:
      interval: weekly
    open-pull-requests-limit: 5
    groups:
      next-and-react:
        patterns:
          - next
          - react
          - react-dom
          - eslint-config-next
          - "@types/react"
          - "@types/react-dom"
      prisma:
        patterns:
          - prisma
          - "@prisma/client"
      test-tools:
        patterns:
          - vitest
          - "@vitest/*"
          - "@playwright/test"
          - "@testing-library/*"
  - package-ecosystem: github-actions
    directory: /
    schedule:
      interval: weekly
