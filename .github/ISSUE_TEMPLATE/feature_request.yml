name: Feature request
description: Suggest an improvement for OneCrew
title: "feat: "
labels: ["enhancement"]
body:
  - type: textarea
    id: problem
    attributes:
      label: Problem
      description: What user or operator problem should this solve?
    validations:
      required: true
  - type: textarea
    id: proposal
    attributes:
      label: Proposed Solution
      description: Describe the behavior you want.
    validations:
      required: true
  - type: textarea
    id: alternatives
    attributes:
      label: Alternatives
      description: Other approaches you considered.
  - type: textarea
    id: impact
    attributes:
      label: Impact
      description: Note UI, API, data model, deployment, or migration impact.
