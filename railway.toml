# Railway service configuration for AI-Native Team Workspace.
#
# Railway picks up this file at the repository root and uses it both
# during the build (Dockerfile mode) and at runtime (start command,
# health check, restart policy). Pair it with a `Procfile`-free
# Dockerfile-only setup so the build stays reproducible across
# Railway, Docker Compose, and local CI runners.
#
# Notes:
#   - `startCommand` must produce a server listening on `$PORT`.
#     Railway injects `PORT` as the public ingress port; our
#     `server.ts` already honors `process.env.PORT` and defaults to
#     3000 in non-Railway environments.
#   - `healthcheckPath = /api/health` matches the route added in P0
#     fix #2; Railway will mark the deploy as healthy once it returns
#     a 200.
#   - `restartPolicyType = ON_FAILURE` keeps a successful exit (rare
#     for a long-lived server) from being interpreted as a crash loop.

[build]
builder = "DOCKERFILE"

[deploy]
# `npx prisma migrate deploy` applies pending Prisma migrations
# against `$DATABASE_URL` before the server starts. Use `tsx` to run
# the custom `server.ts` so the path-mapped `@/...` imports resolve
# without a separate compile step (matches the in-image runner).
#
# We embed echo markers around each step so a healthcheck failure
# can be diagnosed from Deploy Logs alone — without them, Railway
# truncates after the last prisma line and we cannot tell whether
# `tsx server.ts` even started.
startCommand = "echo '==> [railway] running prisma migrate deploy'; npx prisma migrate deploy; echo '==> [railway] launching server.ts via tsx'; node node_modules/tsx/dist/cli.mjs server.ts"
healthcheckPath = "/api/health"
healthcheckTimeout = 30
restartPolicyType = "ON_FAILURE"
restartPolicyMaxRetries = 3
