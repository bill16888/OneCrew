# Railway service configuration for AI-Native Team Workspace.
#
# Railway picks up this file at the repository root and uses it both
# during the build (Dockerfile mode) and at runtime (start command,
# health check, restart policy). Pair it with a `Procfile`-free
# Dockerfile-only setup so the build stays reproducible across
# Railway, Docker Compose, and local CI runners.
#
# Notes:
#   - `startCommand` must produce a server listening on `$PORT`.
#     Railway injects `PORT` as the public ingress port; our
#     `server.ts` already honors `process.env.PORT` and defaults to
#     3000 in non-Railway environments.
#   - `healthcheckPath = /api/health` is deliberately public in
#     `middleware.ts`; Railway will mark the deploy as healthy once it
#     returns a 200.
#   - `restartPolicyType = ON_FAILURE` keeps a successful exit (rare
#     for a long-lived server) from being interpreted as a crash loop.

[build]
builder = "DOCKERFILE"

[deploy]
# Railway's detected start command can fall back to `npm run start`
# even when Dockerfile mode is selected. Keep the command explicit so
# deploys always run the env normalisation + Prisma sync wrapper before
# booting the custom Next/Socket.io server.
startCommand = "npm run start"
healthcheckPath = "/api/health"
# Startup runs `prisma db push` before the HTTP server starts, and
# cold Next.js prepares can exceed the default on Railway's shared
# builders. Give the container enough time to reach the liveness route.
healthcheckTimeout = 120
restartPolicyType = "ON_FAILURE"
restartPolicyMaxRetries = 3
